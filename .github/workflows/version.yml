name: Version

# Stamps every merge to main with a release-line tag.
#
# On each push to main this reads the base semantic version from the package.json `version` field,
# derives the major.minor release line, and pushes an annotated tag `v<major>.<minor>.<patch>`
# pointing at the merge commit. The first tag for a release line uses package.json's patch value
# (for example, package version 0.2.0 produces v0.2.0). Later merges on the same release line
# auto-increment the patch tag (v0.2.1, v0.2.2, ...).
#
# Why a tag instead of committing a bump back to main:
#   - it works identically on protected branches (no bypass actor or bump-commit needed);
#   - it never re-triggers CI or needs [skip ci] loops;
#   - patch tags restart from the package.json patch whenever the major/minor release line changes,
#     so x.y.0 initial releases are possible;
#   - legacy 4-part tags (v1.2.3.7) are ignored by the tag counter.
#
# To see which build a checkout corresponds to: git describe --tags

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push the build tag

# Serialize runs so two closely-spaced merges can't compute the same tag.
concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  tag-build:
    name: Tag release line
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, needed to compute the next build number

      - name: Compute next release-line tag and push it
        run: |
          base=$(jq -r .version package.json)
          if ! echo "$base" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Base version '$base' is not a plain x.y.z semver."
            exit 1
          fi
          IFS=. read -r major minor patch <<< "$base"
          line="${major}.${minor}"
          last=$(git tag --list "v${line}.*" | grep -E "^v${line}\.[0-9]+$" | sed "s/^v${line}\.//" | sort -n | tail -1 || true)
          if [ -z "$last" ]; then
            next="$patch"
          else
            next=$(( last + 1 ))
            if [ "$next" -lt "$patch" ]; then
              next="$patch"
            fi
          fi
          tag="v${line}.${next}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release-line tag ${tag}"
          git push origin "refs/tags/${tag}"
          {
            echo "### Release-line tag stamped: \`${tag}\`"
            echo ""
            echo "- Base version: \`${base}\`"
            echo "- Release line: \`${line}\`"
            echo "- Patch tag: \`${next}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
