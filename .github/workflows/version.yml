name: Version

# Stamps every merge to main with a semver build tag and GitHub release.
#
# On each push to main this reads the base semantic version from the package.json `version` field.
# The project uses the semver patch slot as a build number: <major>.<minor>.<build>.
# The workflow derives the major.minor release line, pushes an annotated tag
# `v<major>.<minor>.<build>` pointing at the merge commit, and creates a GitHub release for it.
# The first tag for a release line uses package.json's build value, so bumping major or minor to
# x.y.0 produces vX.Y.0 when that tag does not exist. Later merges on the same release line
# auto-increment the build tag (v0.2.1, v0.2.2, ...).
#
# Why a tag instead of committing a bump back to main:
#   - it works identically on protected branches (no bypass actor or bump-commit needed);
#   - it never re-triggers CI or needs [skip ci] loops;
#   - build tags restart from the package.json build whenever the major/minor release line changes,
#     so x.y.0 initial releases are possible;
#   - legacy 4-part tags (v1.2.3.7) are ignored by the tag counter.
#
# To see which build a checkout corresponds to: git describe --tags

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push the build tag and create the release

# Serialize runs so two closely-spaced merges can't compute the same tag.
concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  tag-build:
    name: Tag and release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, needed to compute the next build number

      - name: Compute next build tag, push it, and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base=$(jq -r .version package.json)
          if ! echo "$base" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "::error::Base version '$base' is not a plain <major>.<minor>.<build> semver."
            exit 1
          fi
          IFS=. read -r major minor build <<< "$base"
          line="${major}.${minor}"

          existing_tag=$(git tag --points-at "$GITHUB_SHA" --list "v${line}.*" | grep -E "^v${major}\.${minor}\.(0|[1-9][0-9]*)$" | sort -V | tail -1 || true)
          if [ -n "$existing_tag" ]; then
            tag="$existing_tag"
            next="${tag#v${line}.}"
            tag_created=false
          else
            last=$(git tag --list "v${line}.*" | grep -E "^v${major}\.${minor}\.(0|[1-9][0-9]*)$" | sed -E "s/^v${major}\.${minor}\.//" | sort -n | tail -1 || true)
            if [ -z "$last" ]; then
              next="$build"
            else
              next=$(( last + 1 ))
              if [ "$next" -lt "$build" ]; then
                next="$build"
              fi
            fi
            tag="v${line}.${next}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release ${tag}"
            git push origin "refs/tags/${tag}"
            tag_created=true
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            release_created=false
          else
            gh release create "$tag" --target "$GITHUB_SHA" --title "Release ${tag}" --notes "Automated release for ${tag}."
            release_created=true
          fi

          {
            echo "### Build release stamped: \`${tag}\`"
            echo ""
            echo "- Base version: \`${base}\`"
            echo "- Release line: \`${line}\`"
            echo "- Build tag: \`${next}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Tag created: \`${tag_created}\`"
            echo "- Release created: \`${release_created}\`"
          } >> "$GITHUB_STEP_SUMMARY"
