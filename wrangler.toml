name = "valleys-at-ashebrook-hoa"
main = "src/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — makes production observable (invocation logs, console output,
# errors) from the Cloudflare dashboard. No code change; sampling defaults to 100%.
[observability]
enabled = true

[triggers]
crons = ["0 7 * * *"]

# Non-secret runtime vars. Kept here (not as dashboard-only values) so the repo is
# the source of truth and Git auto-deploys stay in sync. Secrets stay out of this file.
[vars]
BETTER_AUTH_URL = "https://ashebrookresidents.com"
TURNSTILE_SITE_KEY = "0x4AAAAAADt_bUgYAEN03njN"
WEB3FORMS_KEY = "ad82b2e5-ff8c-49dd-82fb-50bf90272b55"
AI_SEARCH_INSTANCE = "ashebrook-ai-docs-search"

# Workers AI binding — used for the admin document assistant's retrieval via
# Cloudflare AI Search (env.AI.autorag(...)). The AI Search instance is created
# once in the dashboard against the ashebrook-hoa-docs R2 bucket (see SETUP.md).
[ai]
binding = "AI"

[[d1_databases]]
binding = "DATABASE"
database_name = "ashebrook-hoa"
database_id = "8abbb40e-5436-4884-b3af-583d92368fe0"
migrations_dir = "src/server/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "f778a5efde9f42e491ea3f35fe2a007e"

# Astro Sessions store. Required by @astrojs/cloudflare, which enables Astro
# sessions against a KV binding named SESSION by default — the build keeps
# targeting it even if this block is removed, so dropping it would ship a Worker
# with session support but no backing store. App auth uses Better Auth's D1
# sessions, not Astro.session, which is why no src/ code references SESSION.
[[kv_namespaces]]
binding = "SESSION"
id = "1974eb0f5ccd4c4e9c12bdde96308e72"

[[r2_buckets]]
binding = "DOCS"
bucket_name = "ashebrook-hoa-docs"
